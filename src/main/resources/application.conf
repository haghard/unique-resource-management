include "persistence.conf"

akka.http.server.preview.enable-http2 = on

akka {
  loglevel = DEBUG
  # Optimization: If an event would not be logged by slf4j, it will not be sent to the logging event bus.
  logging-filter = "akka.event.slf4j.Slf4jLoggingFilter"
  # Only use the slf4j logging, do not log directly to console.
  loggers = ["akka.event.slf4j.Slf4jLogger"]
  stdout-loglevel = OFF
  logger-startup-timeout = 60s

  log-dead-letters = 10
  log-dead-letters-during-shutdown = false


  actor {
    allow-java-serialization = off
    warn-about-java-serializer-usage = on

    provider = akka.cluster.ClusterActorRefProvider

    serializers {
      #akka-replicated-data  = "akka.cluster.ddata.protobuf.ReplicatedDataSerializer"
      akka-replicated-data  = "akka.cluster.ddata.CRDTSerializer"

      #akka-data-replication = "akka.cluster.ddata.protobuf.ReplicatorMessageSerializer"
      akka-data-replication = "akka.cluster.ddata.CustomReplicatorMessageSerializerUdp"


      #akka-sharding = "akka.cluster.sharding.protobuf.ClusterShardingMessageSerializer"
      akka-sharding = "akka.cluster.sharding.CustomClusterShardingMessageSerializer"

      proto = "akka.remote.serialization.ProtobufSerializer"
    }

    serialization-identifiers {
      #"akka.cluster.ddata.protobuf.ReplicatorMessageSerializer" = 11
      "akka.cluster.ddata.CRDTSerializer" = 11

      "akka.cluster.ddata.CustomReplicatorMessageSerializerUdp" = 12

      #"akka.cluster.sharding.protobuf.ClusterShardingMessageSerializer" = 13
      "akka.cluster.sharding.CustomClusterShardingMessageSerializer" = 13
    }

    serialization-bindings {
      "scalapb.GeneratedMessage" = proto
      #"com.google.protobuf.Message" = proto
    }
    
    default-dispatcher {
      fork-join-executor {
        parallelism-min = 2
        parallelism-factor = 1.0
        parallelism-max = 8
      }
    }

    # Default separate internal dispatcher to run Akka internal tasks and actors on
    # protecting them against starvation because of accidental blocking in user actors (which run on the
    # default dispatcher)
    internal-dispatcher {
      type = "Dispatcher"
      executor = "fork-join-executor"
      throughput = 5
      fork-join-executor {
        parallelism-min = 2
        parallelism-factor = 1.0
        parallelism-max = 4
      }
    }
  }

  cluster {

    //https://doc.akka.io/libraries/akka-core/2.7/typed/cluster-sharding.html#configuration
    sharding {
      # Maximum number of messages that are buffered by a ShardRegion actor.
      buffer-size = 2000

      # The ShardRegion retries registration and shard location requests to the
      # ShardCoordinator with this interval if it does not reply.
      retry-interval = 2 s

      # Rebalance check is performed periodically with this interval.
      rebalance-interval = 5s #10s


      #ShardCoordinator State - the Shard locations. This is stored in the State Store.
      state-store-mode = ddata  #eventsourced

      #remember-entities = on
      #remember-entities-store = ddata #eventsourced

      #number-of-shards = 32 #ShardCoordinator.Internal.State: 3_035 bts
      #number-of-shards = 64 #a.c.s.ShardCoordinator.Internal.State:[shards:63/regions:2, 6121 bts]
      #number-of-shards = 128 #ShardCoordinator.Internal.State: 11_849 bts
      number-of-shards = 1000

      passivation {
        default-idle-strategy.idle-entity.timeout = 25 s
      }

      #https://doc.akka.io/docs/akka/current/typed/cluster-sharding.html?_ga=2.225099034.1493026331.1653164470-1899964194.1652800389#automatic-passivation
      #passivation {
      #  strategy = default-strategy
      #  default-strategy {
      #    active-entity-limit = 1000
      #    idle-entity.timeout = 5 m  # 20 s
      #  }
      #}

      # Healthcheck that can be used with Akka management health checks: https://doc.akka.io/docs/akka-management/current/healthchecks.html
      healthcheck {
        # sharding names to check have registered with the coordinator for the health check to pass
        # once initial registration has taken place the health check always returns true to prevent the coordinator
        # moving making the health check of all nodes fail
        # by default no sharding instances are monitored
        names = ["rs", "usr-rs"]

        # Timeout for the local shard region to respond. This should be lower than your monitoring system's
        # timeout for health checks
        timeout = 5s
      }

      # custom setting
      redelivery-interval = 6 s
    }

    app-version = ${APP_VERSION_VAR}

    # Minimum required number of members before the leader changes member status
    # of 'Joining' members to 'Up'. Typically used together with
    # 'Cluster.registerOnMemberUp' to defer some action, such as starting actors,
    # until the cluster has reached a certain size.
    # Set to 2, so that during a rolling deployment at least two nodes are in `Joining` or `Up` status before promoting
    # the new nodes to `Up`.
    min-nr-of-members = ${REQ_CONTACT_POINT_VAR}

    # The joining of given seed nodes will by default be retried indefinitely until
    # a successful join. That process can be aborted if unsuccessful by defining this
    # timeout. When aborted it will run CoordinatedShutdown, which by default will
    # terminate the ActorSystem. CoordinatedShutdown can also be configured to exit
    # the JVM. It is useful to define this timeout if the seed-nodes are assembled
    # dynamically and a restart with new seed-nodes should be tried after unsuccessful
    # attempts.
    # Setting the value to 30 seconds is a recommendation of: https://doc.akka.io/docs/akka-management/current/bootstrap/index.html#recommended-configuration
    # After the shutdown, Kubernetes will restart your node and the operation will (presumably) eventually succeed.
    shutdown-after-unsuccessful-join-seed-nodes = 40s

    downing-provider-class = "akka.cluster.sbr.SplitBrainResolverProvider"

    # Expected failover time:
    #
    # There are several configured timeouts that add to the total failover latency. With default configuration those are:
    #
    # 1) failure detection 5 seconds
    # 2) akka.cluster.split-brain-resolver.stable-after 7 seconds
    # 3) akka.cluster.down-removal-margin (by default the same as sakka.cluster.split-brain-resolver.stable-after) 7 seconds
    #
    # In total, you can expect the failover time of a singleton or sharded instance to be around (5+7+(7*3/4) = 18) seconds with this configuration.
    #
    split-brain-resolver {
      # static-quorum, keep-majority, keep-oldest, down-all, lease-majority

      #https://doc.akka.io/docs/akka-management/current/kubernetes-lease.html
      #Q. What happens if the node that holds the lease crashes?

      #A. Each lease has a Time To Live (TTL) that is set akka.coordination.lease.kubernetes.heartbeat-timeout which defaults to 120s.
      # A lease holder updates the lease every 1/10 of the timeout to keep the lease. If the TTL passes without the lease being updated another node
      # is allowed to take the lease. For ultimate safety this timeout can be set very high but then an operator would need to come and clear the lease
      # if a lease owner crashes with the lease taken.
      active-strategy = lease-majority

      lease-majority {
        lease-implementation = "akka.coordination.lease.kubernetes"
        acquire-lease-delay-for-minority = 2 s
      }

      #//#stable-after
      # Time margin after which shards or singletons that belonged to a downed/removed
      # partition are created in surviving partition. The purpose of this margin is that
      # in case of a network partition the persistent actors in the non-surviving partitions
      # must be stopped before corresponding persistent actors are started somewhere else.
      # This is useful if you implement downing strategies that handle network partitions,
      # e.g. by keeping the larger side of the partition and shutting down the smaller side.
      # Decision is taken by the strategy when there has been no membership or
      # reachability changes for this duration, i.e. the cluster state is stable.
      stable-after = 10 s

      # When reachability observations by the failure detector are changed the SBR decisions
      # are deferred until there are no changes within the 'stable-after' duration.
      # If this continues for too long it might be an indication of an unstable system/network
      # and it could result in delayed or conflicting decisions on separate sides of a network
      # partition.
      # As a precaution for that scenario all nodes are downed if no decision is made within
      # `stable-after + down-all-when-unstable` from the first unreachability event.
      # The measurement is reset if all unreachable have been healed, downed or removed, or
      # if there are no changes within `stable-after * 2`.
      # The value can be on, off, or a duration.
      # By default it is 'on' and then it is derived to be 3/4 of stable-after.
      down-all-when-unstable = off
    }
  }

  # CoordinatedShutdown will run the tasks that are added to these
  # phases. The phases can be ordered as a DAG by defining the
  # dependencies between the phases.
  # Each phase is defined as a named config section with the
  # following optional properties:
  # - timeout=15s: Override the default-phase-timeout for this phase.
  # - recover=off: If the phase fails the shutdown is aborted
  #                and depending phases will not be executed.
  # depends-on=[]: Run the phase after the given phases
  coordinated-shutdown {

    # Exit the JVM (System.exit(0)) in the last phase actor-system-terminate
    # if this is set to 'on'. It is done after termination of the
    # ActorSystem if terminate-actor-system=on, otherwise it is done
    # immediately when the last phase is reached.
    exit-jvm = on
    default-phase-timeout = 5 seconds

    phases {

      # Wait until exiting has been completed
      cluster-exiting-done {
        timeout = 12 s # increase if to many chatrooms need to be released.
        depends-on = [cluster-exiting]
      }
    }
  }

  //https://doc.akka.io/docs/akka-management/current/akka-management.html
  management {

    cluster.bootstrap {
      # Cluster Bootstrap will always attempt to join an existing cluster if possible. However
      # if no contact point advertises any seed-nodes a new cluster will be formed by the
      # node with the lowest address as decided by [[LowestAddressJoinDecider]].
      # Setting `new-cluster-enabled=off` after an initial cluster has formed is recommended to prevent new clusters
      # forming during a network partition when nodes are redeployed or restarted.
      # Replaces `form-new-cluster`, if `form-new-cluster` is set it takes precedence over this
      # property for backward compatibility
      new-cluster-enabled = on

      contact-point-discovery {

        # pick the discovery method you'd like to use:
        discovery-method = kubernetes-api

        kubernetes-api {
          # Namespace to query for pods
          # The lookup needs to know which namespace to look in.
          # By default, this will be detected by reading the namespace from the service account secret,
          # in /var/run/secrets/kubernetes.io/serviceaccount/namespace
          # Namespace can be overriden with `pod-namespace` key.
          # pod-namespace = "default"

          # Selector value to query pod API with.
          # `%s` will be replaced with the configured effective name, which defaults to the actor system name
          # Default: "app=%s"
          # pod-label-selector = "app=%s"

          # The name of the akka management port
          # Default: "management"
          # pod-port-name = "management"
        }

        # Interval at which service discovery will be polled in search for new contact-points
        #interval = 1 second

        # For complete safety of the Initial Bootstrap it is recommended to set the contact-point-discovery.required-contact-point-nr
        # setting to the exact number of nodes the initial startup of the cluster will be done. For example, if starting a cluster with 4 nodes initially,
        # and later scaling it out to many more nodes, be sure to set this setting to 4 for additional safety of the initial joining,
        # even in face of an flaky discovery mechanism!
        required-contact-point-nr = ${REQ_CONTACT_POINT_VAR}

        # Amount of time for which a discovery observation must remain "stable"
        # (i.e. not change list of discovered contact-points) before a join decision can be made.
        # This is done to decrease the likelyhood of performing decisions on fluctuating observations.
        #
        # This timeout represents a tradeoff between safety and quickness of forming a new cluster.
        stable-margin = 5 seconds #5 seconds

        # Timeout for getting a reply from the service-discovery subsystem
        resolve-timeout = 3 seconds
      }

      # Amount of time for which a discovery observation must remain "stable"
      # (i.e. not change list of discovered contact-points) before a join decision can be made.
      # This is done to decrease the likelyhood of performing decisions on fluctuating observations.
      #
      # This timeout represents a tradeoff between safety and quickness of forming a new cluster.
      stable-margin = 5 seconds

    }


    health-checks {
      # When exposting health checks via Akka Management, the path to expost readiness checks on
      readiness-path = "ready"
      # When exposting health checks via Akka Management, the path to expost readiness checks on
      liveness-path = "alive"

      liveness-checks {
      }

      readiness-checks {
        # When defining both Readiness and Liveness Probes, it is recommended to allow enough time for the Readiness Probe
        # to possibly fail a few times before a pass, and only then check the Liveness Probe. If Readiness and Liveness Probes
        # overlap there may be a risk that the container never reaches ready state, being stuck in an infinite re-create - fail loop.

        custom-shutdown-hook = com.resource.ShutdownHookReadinessCheck

        # Default health check for cluster. Overwrite the setting to replace it with
        # your implementation or set it to "" (empty string) to disable this check.
        cluster-membership = akka.management.cluster.scaladsl.ClusterMembershipCheck

        # There is also a new health check for Cluster Sharding that you can enable when you don’t want to receive production
        # traffic until the local shard region is ready to retrieve locations for shards.

        #return true only when the local shard region has registered with the coordinator.
        sharding = akka.cluster.sharding.ClusterShardingHealthCheck
      }
    }

    http {
      route-providers-read-only = false
    }
  }

  remote {
    # Disable event logging
    log-remote-lifecycle-events = off
    artery {
      # Select the underlying transport implementation.
      # Possible values: aeron-udp, tcp, tls-tcp
      # See https://doc.akka.io/docs/akka/current/remoting-artery.html#selecting-a-transport for the tradeoffs
      # for each transport

      #https://doc.akka.io/docs/akka/current/remoting-artery.html#selecting-a-transport
      transport = aeron-udp
      #transport = tcp

      # To notice large messages you can enable logging of message types with payload size in bytes larger than the configured
      log-frame-size-exceeding = 250 KiB

      advanced {
        # Maximum serialized message size, including header data.
        maximum-frame-size = 256 KiB #512 KiB

        # Direct byte buffers are reused in a pool with this maximum size.
        # Each buffer has the size of 'maximum-frame-size'.
        # This is not a hard upper limit on number of created buffers. Additional
        # buffers will be created if needed, e.g. when using many outbound
        # associations at the same time. Such additional buffers will be garbage
        # collected, which is not as efficient as reusing buffers in the pool.
        buffer-pool-size = 128

        # Maximum serialized message size for the large messages, including header data.
        # It is currently restricted to 1/8th the size of a term buffer that can be
        # configured by setting the 'aeron.term.buffer.length' system property.
        # See 'large-message-destinations'.
        maximum-large-frame-size = 2 MiB

        # Direct byte buffers for the large messages are reused in a pool with this maximum size.
        # Each buffer has the size of 'maximum-large-frame-size'.
        # See 'large-message-destinations'.
        # This is not a hard upper limit on number of created buffers. Additional
        # buffers will be created if needed, e.g. when using many outbound
        # associations at the same time. Such additional buffers will be garbage
        # collected, which is not as efficient as reusing buffers in the pool.
        large-buffer-pool-size = 32


        # Total number of inbound lanes, shared among all inbound associations. A value
        # greater than 1 means that deserialization can be performed in parallel for
        # different destination actors. The selection of lane is based on consistent
        # hashing of the recipient ActorRef to preserve message ordering per receiver.
        # Lowest latency can be achieved with inbound-lanes=1 because of one less
        # asynchronous boundary.
        inbound-lanes = 4

        # Number of outbound lanes for each outbound association. A value greater than 1
        # means that serialization and other work can be performed in parallel for different
        # destination actors. The selection of lane is based on consistent hashing of the
        # recipient ActorRef to preserve message ordering per receiver. Note that messages
        # for different destination systems (hosts) are handled by different streams also
        # when outbound-lanes=1. Lowest latency can be achieved with outbound-lanes=1
        # because of one less asynchronous boundary.
        outbound-lanes = 1


        # Only used when transport is aeron-udp
        aeron {

          # Periodically log out all Aeron counters. See https://github.com/real-logic/aeron/wiki/Monitoring-and-Debugging#counters
          # Only used when transport is aeron-udp.
          log-aeron-counters = false

          # Controls whether to start the Aeron media driver in the same JVM or use external
          # process. Set to 'off' when using external media driver, and then also set the
          # 'aeron-dir'.
          # Only used when transport is aeron-udp.
          embedded-media-driver = on

          # Directory used by the Aeron media driver. It's mandatory to define the 'aeron-dir'
          # if using external media driver, i.e. when 'embedded-media-driver = off'.
          # Embedded media driver will use a this directory, or a temporary directory if this
          # property is not defined (empty).
          # Only used when transport is aeron-udp.
          #aeron-dir = ""

          # Whether to delete aeron embedded driver directory upon driver stop.
          # Only used when transport is aeron-udp.
          delete-aeron-dir = yes

          # Level of CPU time used, on a scale between 1 and 10, during backoff/idle.
          # The tradeoff is that to have low latency more CPU time must be used to be
          # able to react quickly on incoming messages or send as fast as possible after
          # backoff backpressure.
          # Level 1 strongly prefer low CPU consumption over low latency.
          # Level 10 strongly prefer low latency over low CPU consumption.
          # Only used when transport is aeron-udp.
          idle-cpu-level = 1

          # messages that are not accepted by Aeron are dropped after retrying for this period
          # Only used when transport is aeron-udp.
          give-up-message-after = 60 seconds

          # Timeout after which aeron driver has not had keepalive messages
          # from a client before it considers the client dead.
          # Only used when transport is aeron-udp.
          client-liveness-timeout = 20 seconds

          # Timout after after which an uncommitted publication will be unblocked
          # Only used when transport is aeron-udp.
          publication-unblock-timeout = 40 seconds

          # Timeout for each the INACTIVE and LINGER stages an aeron image
          # will be retained for when it is no longer referenced.
          # This timeout must be less than the 'handshake-timeout'.
          # Only used when transport is aeron-udp.
          image-liveness-timeout = 10 seconds

          # Timeout after which the aeron driver is considered dead
          # if it does not update its C'n'C timestamp.
          # Only used when transport is aeron-udp.
          driver-timeout = 20 seconds
        }
      }
    }
  }

  stream.materializer {
    initial-input-buffer-size = 16
    max-input-buffer-size = 32
    max-fixed-buffer-size = 32
    dispatcher = akka.actor.default-dispatcher

    stream-ref {
      buffer-capacity = 16
      subscription-timeout = 3 seconds
    }
  }
}


fj-dispatcher {
  type = Dispatcher
  executor = "fork-join-executor"
  fork-join-executor {
    parallelism-factor = 1.0
    parallelism-min = 2
    parallelism-max = 8
  }
}

fixed-thread-pool {
  type = Dispatcher
  executor = "thread-pool-executor"
  thread-pool-executor {
    fixed-pool-size = 5
  }
  throughput = 1
}

resizable-thread-pool {
  type = Dispatcher
  executor = "thread-pool-executor"
  thread-pool-executor {
    core-pool-size-min = 4
    core-pool-size-factor = 2.0
    core-pool-size-max = 8
  }
  throughput = 1000
}


akka.cluster.typed.receptionist {
  write-consistency = majority
  distributed-key-count = 6
}

akka.projection {
  at-least-once {
    save-offset-after-envelopes = 100
    save-offset-after-duration = 250 ms
  }

  grouped {
    group-after-envelopes = 20
    group-after-duration = 500 ms
  }

  management {
    # timeout for the operations in ProjectionManagement
    operation-timeout = 10 s
    # timeout for individual management requests, they are retried in case of timeout until the operation-timeout
    ask-timeout = 3 s
  }
}


#https://doc.akka.io/libraries/akka-management/current/kubernetes-lease.html
akka.coordination.lease.kubernetes {
  lease-class = "akka.coordination.lease.kubernetes.KubernetesLease"
  heartbeat-interval = 24s
  heartbeat-timeout = 120s
  lease-operation-timeout = 10s
  //interval=24s, timeout=120s, op-timeout=10s	Deadline=38s, Retries on failure~2
}

number-of-resource-tables=3