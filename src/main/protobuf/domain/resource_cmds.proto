syntax = "proto3";

import "google/protobuf/wrappers.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/any.proto";

import "scalapb/scalapb.proto";
import "domain/resource_state.proto";

option java_multiple_files = true;
option java_package = "com.resource.domain.resource";

package com.resource.domain.resource;

option (scalapb.options) = {
  lenses: true,
  preserve_unknown_fields: false,
  no_default_values_in_constructor: false,
  no_primitive_wrappers: true,
  single_file: true,
};

message ResourceCmd {
  oneof sealed_value {
    Assign assign = 1;
    Release release = 2;
    Reassign reassign = 3;

    Unassign unassign = 4;
    //ReleaseAllocated release_allocated = 4;
    Passivate passivate = 5;
  }
}

message Assign {
  string user_id = 1;
  Resource resource = 2 [(scalapb.field).no_box = true];
  int64 pending_cmd_seq_num = 3;
  string replyTo = 4;
}

message Release {
  string user_id = 1;
  Resource resource = 2 [(scalapb.field).no_box = true];
  ResourceLocation location = 3 [(scalapb.field).no_box = true];
  int64 pending_cmd_seq_num = 4;
  string replyTo = 5;
}

message Reassign {
  string user_id = 1;
  Resource resource = 2 [(scalapb.field).no_box = true];
  ResourceLocation released_location = 3 [(scalapb.field).no_box = true];
  int64 pending_cmd_seq_num = 4;
  string replyTo = 5;
}

message Unassign /*ReleaseAllocated*/ {
  string user_id = 1;
  Resource resource = 2 [(scalapb.field).no_box = true];
  ResourceLocation assigned_location = 3 [(scalapb.field).no_box = true];
  ResourceLocation unassigned_location = 4 [(scalapb.field).no_box = true];
  int64 pending_cmd_seq_num = 5;
  string replyTo = 6;
}

message Passivate {}
