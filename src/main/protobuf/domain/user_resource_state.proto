syntax = "proto3";

import "google/protobuf/wrappers.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/any.proto";

import "scalapb/scalapb.proto";
import "api/grpc_api.proto";
import "domain/resource_state.proto";
import "domain/user_resource_cmds.proto";

option java_multiple_files = true;
option java_package = "com.resource.domain.user";

package com.resource.domain.user;

message UserResourceState {
  LockState lock_state = 1 ;
  LinkedResource linked_resource = 2;
}

message LockState {
  UserCmd pending_user_cmd = 1 [(scalapb.field).no_box = true];
  int64 pending_cmd_seq_num = 2;
}

message LinkedResource {
  Resource resource = 1 [(scalapb.field).no_box = true];
  ResourceLocation location = 2 [(scalapb.field).no_box = true];
}