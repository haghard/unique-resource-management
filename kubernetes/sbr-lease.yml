apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  # name must match the spec fields below, and be in the form: <plural>.<group>
  name: leases.akka.io
  #namespace: wallets-ns
spec:
  group: akka.io
  versions:
   - name: v1
     storage: true
     served: true
     schema:
       openAPIV3Schema:
         type: object
         properties:
           spec:
             type: object
             properties:
               owner:
                 type: string
               version:
                 type: string
               time:
                 type: integer
  scope: Namespaced
  names:
    # kind is normally the CamelCased singular type. Your resource manifests use this.
    kind: Lease
    listKind: LeaseList
    # singular name to be used as an alias on the CLI and for display
    singular: lease
    # plural name to be used in the URL: /apis/<group>/<version>/<plural>
    plural: leases

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lease-access
  #namespace: wallets-ns
rules:
  - apiGroups: ["akka.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lease-access
  #namespace: wallets-ns
subjects:
  - kind: User
    name: system:serviceaccount:resources-ns:default
roleRef:
  kind: Role
  name: lease-access
  apiGroup: rbac.authorization.k8s.io

#https://doc.akka.io/libraries/akka-management/current/kubernetes-lease.html
#https://doc.akka.io/docs/akka-management/current/kubernetes-lease.html
#https://github.com/jmarin/akka-sbr-lease-example/blob/master/kubernetes/crd.yml